add_newline = true

[username]
show_always = true
style_user = "bg:#EBC200 fg:#020617"
style_root = "bg:#EBC200 fg:#020617"
format = "[$user ]($style)"

[directory]
style = "bg:#EB5F0C fg:#020617"
format = "[ $path ]($style)"
truncate_to_repo = false
truncation_length = 1000
home_symbol = "~"

[git_branch]
symbol = "´Éÿ"
style = "bg:#22c55e fg:#020617"
format = "[ $symbol $branch ]($style)"

